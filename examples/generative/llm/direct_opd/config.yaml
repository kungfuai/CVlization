# Direct-OPD Training Configuration
# Paper: "Weak-to-Strong Generalization via Direct On-Policy Distillation"
# https://github.com/BytedTsinghua-SIA/Direct-OPD

models:
  # Stronger student model (being improved)
  student: "Qwen/Qwen3-1.7B"
  # Post-RL weak teacher (provides the "what RL learned" signal)
  teacher: "hbx/JustRL-DeepSeek-1.5B"
  # Pre-RL teacher reference (baseline before RL training)
  teacher_ref: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"

data:
  # Skywork math dataset for training prompts
  dataset: "Skywork/Skywork-OR1-RL-Data"
  split: "math"
  max_prompts: 500
  prompt_template: |
    Solve the following math problem step by step. The last line of your
    response should be of the form Answer: $Answer (without quotes) where
    $Answer is the answer to the problem.

    {question}

    Remember to put your answer on its own line after "Answer:".

training:
  output_dir: "outputs"
  max_steps: 20
  batch_size: 1
  responses_per_prompt: 1
  max_prompt_len: 512
  max_response_len: 512
  learning_rate: 1.0e-6
  weight_decay: 0.01
  warmup_steps: 2
  gradient_checkpointing: true
  logging_steps: 1
  save_steps: 10
  seed: 42

opd:
  # Number of top student tokens to evaluate teacher delta on
  top_k: 16
  # KL divergence coefficient (penalizes drift from initial student)
  kl_coef: 0.1
  # Adaptive KL control
  adaptive_kl: true
  adaptive_kl_step: 0.01
  kl_coef_min: 0.01
  kl_coef_max: 2.5

generation:
  temperature: 1.0
  do_sample: true
