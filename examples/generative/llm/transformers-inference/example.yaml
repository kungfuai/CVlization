name: transformers-inference
capability: generative/llm
modalities: [text]
stability: experimental
resources:
  gpu: 1
  vram_gb: 16
  disk_gb: 20
image: cvl-transformers-inference

presets:
  build:
    script: build.sh
    description: Build container (torch 2.9.1 + transformers>=5.3.0)
  predict:
    script: predict.sh
    description: "Run chat inference with any HuggingFace causal LM. Default: allenai/Olmo-Hybrid-Instruct-DPO-7B"
  serve:
    script: serve.sh
    description: "Launch OpenAI-compatible TGI server (pulls ghcr.io/huggingface/text-generation-inference)"
tags: [transformers, huggingface, llm, text-generation, hybrid, olmo]
tasks: [text_generation]

verification:
  last_verified: "2026-03-30"
  last_verification_note: "Verified build and inference (OLMo-Hybrid-Instruct-DPO-7B) on RTX PRO 6000 Blackwell (98GB VRAM). Uses ~14.2GB VRAM. Outputs saved to outputs/result.txt in user cwd."
