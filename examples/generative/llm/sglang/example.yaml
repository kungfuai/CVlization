name: sglang
capability: generative/llm
modalities: [text]
stability: experimental
resources:
  gpu: 1
  vram_gb: 8
  disk_gb: 8
image: cvl-sglang

presets:
  build:
    script: build.sh
    description: Build SGLang container (torch 2.9.1 + sglang 0.5.9)
  predict:
    script: predict.sh
    description: "Run a local SGLang chat (starts server + client in one container). Default model: allenai/Olmo-3-7B-Instruct."
  serve:
    script: serve.sh
    description: Launch OpenAI-compatible SGLang server with auto-tuning
tags: [sglang, openai-api, llm, serving, text-generation]
tasks: [text_generation, serving]

verification:
  last_verified: "2026-02-25"
  last_verification_note: "sglang 0.5.9, PyTorch 2.9.1+CUDA 12.8 on RTX PRO 6000 Blackwell Max-Q (SM120, 95GB VRAM). All 8 previously-verified models confirmed: Olmo-3-7B-Instruct, Phi-4-mini-instruct, Olmo-3-7B-Think, OLMo-2-1124-7B-Instruct-preview, internlm3-8b-instruct, Qwen3-8B, gemma-3-1b-it all pass. LFM2-1.2B passes with SGLANG_EXTRA_ARGS='--attention-backend torch_native' (triton backend rejected for Mamba models on SM120). SM100 sed workaround still needed. CuDNN 9.16 pin still needed."
  status: VERIFIED
