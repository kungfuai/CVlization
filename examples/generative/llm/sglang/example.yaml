name: sglang
capability: generative/llm
modalities: [text]
stability: experimental
resources:
  gpu: 1
  vram_gb: 8
  disk_gb: 8
image: cvl-sglang

presets:
  build:
    script: build.sh
    description: Build SGLang container (torch 2.9.1 + sglang 0.5.9)
  predict:
    script: predict.sh
    description: "Run a local SGLang chat (starts server + client in one container). Default model: allenai/Olmo-3-7B-Instruct."
  serve:
    script: serve.sh
    description: Launch OpenAI-compatible SGLang server with auto-tuning
tags: [sglang, openai-api, llm, serving, text-generation]
tasks: [text_generation, serving]

verification:
  last_verified: "2026-02-26"
  last_verification_note: "sglang 0.5.9, PyTorch 2.9.1+CUDA 12.8 on RTX PRO 6000 Blackwell Max-Q (SM120, 95GB VRAM). 9 models confirmed: 8 chat + Llama-3.1-8B-Instruct (gated). LFM2-1.2B auto-selects torch_native. openai/gpt-oss-20b fails: SM120a lacks .tile::gather4 .shared::cluster TMA instruction used by SGLang's GPT-OSS Triton MoE kernel (affects both MXFP4 and bf16 variants); use vLLM instead."
  status: VERIFIED
