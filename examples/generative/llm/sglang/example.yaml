name: sglang
capability: generative/llm
modalities: [text]
stability: experimental
resources:
  gpu: 1
  vram_gb: 8
  disk_gb: 8
image: cvl-sglang

presets:
  build:
    script: build.sh
    description: Build SGLang container (torch 2.11.0 + CUDA 13.0 + sglang 0.5.12)
  predict:
    script: predict.sh
    description: "Run a local SGLang chat (starts server + client in one container). Default model: allenai/Olmo-3-7B-Instruct."
  serve:
    script: serve.sh
    description: Launch OpenAI-compatible SGLang server with auto-tuning
tags: [sglang, openai-api, llm, serving, text-generation]
tasks: [text_generation, serving]

verification:
  last_verified: "2026-05-23"
  last_verification_note: "sglang 0.5.12 (bumped from 0.5.10), transformers 5.6.0 (sglang dep; was 5.3.0), PyTorch 2.11.0+CUDA 13.0 on RTX PRO 6000 Blackwell (SM120, 98GB VRAM). 2026-05-23: verified Qwen/Qwen3.6-27B (GDN hybrid, VLM, reasoning; load 13s, KV pool 252K tokens), Qwen/Qwen3.6-35B-A3B (MoE+GDN ~3B active; load 22s, KV pool 403K), zai-org/GLM-4.7-Flash (Glm4MoeLite ~3B active, reasoning; load 6s, KV pool 470K). GLM-4.7-Flash required a Dockerfile patch injecting a class-level `_shared_expert_tp1 = False` default on Glm4MoeLiteSparseMoeBlock (sglang 0.5.12 inherits DeepseekV2MoE's forward path which reads this attribute, but the GLM subclass never sets it). Also 2026-05-23: verified nvidia/NVIDIA-Nemotron-Labs-3-Elastic-30B-A3B-BF16 (NemotronHForCausalLM, MoE+Mamba2+Attn ~3B active, reasoning; load 9s, mem 58.94 GB, KV pool 1.88M tokens with `torch_native` attention backend); needed a gpu_utils.py override (`nemotron-labs-3` and `nemotron-3-nano` patterns -> torch_native) because SGLang's triton backend asserts the first layer is attention, which NemotronH violates. nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-BF16 NOT supported on sglang 0.5.12: HF config arch `NemotronH_Nano_Omni_Reasoning_V3` has no model file in 0.5.12 source (only nemotron_h.py and nano_nemotron_vl.py exist). Earlier on 2026-04-06 with sglang 0.5.10: verified OLMo-3-7B-Instruct (rope_theta patch), OLMo-3-7B-Think, Ministral-3-8B-Instruct-2512 (fp8), LFM2.5-VL-1.6B (Mamba VLM). Voxtral-Mini-3B-2507 and Gemma 4 unsupported on 0.5.10; not re-tested on 0.5.12. openai/gpt-oss-20b fails on SM120a (TMA instruction missing); use vLLM."
  status: VERIFIED
