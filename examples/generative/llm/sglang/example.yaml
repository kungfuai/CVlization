name: sglang
capability: generative/llm
modalities: [text]
stability: experimental
resources:
  gpu: 1
  vram_gb: 8
  disk_gb: 8
image: cvl-sglang

presets:
  build:
    script: build.sh
    description: Build SGLang container (torch 2.9.1 + sglang 0.5.9)
  predict:
    script: predict.sh
    description: "Run a local SGLang chat (starts server + client in one container). Default model: allenai/Olmo-3-7B-Instruct."
  serve:
    script: serve.sh
    description: Launch OpenAI-compatible SGLang server with auto-tuning
tags: [sglang, openai-api, llm, serving, text-generation]
tasks: [text_generation, serving]

verification:
  last_verified: "2026-02-26"
  last_verification_note: "sglang 0.5.9, PyTorch 2.9.1+CUDA 12.8 on RTX PRO 6000 Blackwell Max-Q (SM120, 95GB VRAM). All 8 chat models confirmed. LFM2-1.2B auto-selects torch_native backend (Mamba model). Hunyuan-A13B-Instruct-FP8 fails: v_head_dim=null bug patched in Dockerfile; FP8 MoE Triton kernel still fails (147KB shared mem required > 101KB SM120 limit); use vLLM instead."
  status: VERIFIED
