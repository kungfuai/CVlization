name: sglang
capability: generative/llm
modalities: [text]
stability: experimental
resources:
  gpu: 1
  vram_gb: 8
  disk_gb: 8
image: cvl-sglang

presets:
  build:
    script: build.sh
    description: Build SGLang container (torch 2.11.0 + CUDA 13.0 + sglang 0.5.10)
  predict:
    script: predict.sh
    description: "Run a local SGLang chat (starts server + client in one container). Default model: allenai/Olmo-3-7B-Instruct."
  serve:
    script: serve.sh
    description: Launch OpenAI-compatible SGLang server with auto-tuning
tags: [sglang, openai-api, llm, serving, text-generation]
tasks: [text_generation, serving]

verification:
  last_verified: "2026-04-06"
  last_verification_note: "sglang 0.5.10, PyTorch 2.11.0+CUDA 13.0 on RTX PRO 6000 Blackwell (SM120, 98GB VRAM). Verified: OLMo-3-7B-Instruct (rope_theta patch applied), OLMo-3-7B-Think, Ministral-3-8B-Instruct-2512 (fp8; CUDA 13.0 required for SM120), LFM2.5-VL-1.6B (Mamba VLM). Voxtral-Mini-3B-2507 fails: MistralCommonBackend incompatible with sglang tokenizer loading kwargs. Gemma 4 not supported (sglang 0.5.10 pins transformers==5.3.0). openai/gpt-oss-20b fails on SM120a (TMA instruction missing); use vLLM instead."
  status: VERIFIED
