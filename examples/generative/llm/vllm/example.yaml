name: vllm
capability: generative/llm
modalities: [text]
stability: experimental
resources:
  gpu: 1
  vram_gb: 8
  disk_gb: 8
image: cvl-vllm

presets:
  build:
    script: build.sh
    description: Build vLLM container (torch 2.9.1 + vLLM 0.19.0 + transformers 5.5.0)
  predict:
    script: predict.sh
    description: "Run a local vLLM inference (no server required). Default model: allenai/Olmo-3-7B-Instruct."
  serve:
    script: serve.sh
    description: Launch OpenAI-compatible vLLM server with auto-tuning
tags: [vllm, openai-api, llm, serving, text-generation, qwen, gemma]
tasks: [text_generation, serving]

verification:
  last_verified: "2026-04-06"
  last_verification_note: "vLLM 0.19.0 + transformers 5.5.0, PyTorch 2.9.1+CUDA 12.8 on RTX PRO 6000 Blackwell (SM120, 98GB VRAM). Verified: OLMo-3-7B-Instruct, Qwen/Qwen3-4B (think mode), google/gemma-4-e2b-it, nvidia/NVIDIA-Nemotron-Nano-9B-v2 (thinking mode, Mamba-2+Attn hybrid), nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16 (MoE+Mamba-2+Attn, 3.5B active). transformers 5.5.0 installed after vllm (overrides <5 pip constraint); vLLM 0.19.0 includes explicit v5 compat fixes (PRs #37681, #38127)."
  status: VERIFIED
