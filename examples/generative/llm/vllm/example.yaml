name: vllm
capability: generative/llm
modalities: [text]
stability: experimental
resources:
  gpu: 1
  vram_gb: 8
  disk_gb: 8
image: cvl-vllm

presets:
  build:
    script: build.sh
    description: Build vLLM container (torch 2.9.1 + vLLM 0.15.1)
  predict:
    script: predict.sh
    description: "Run a local vLLM inference (no server required). Default model: allenai/Olmo-3-7B-Instruct."
  serve:
    script: serve.sh
    description: Launch OpenAI-compatible vLLM server with auto-tuning
tags: [vllm, openai-api, llm, serving, text-generation]
tasks: [text_generation, serving]

verification:
  last_verified: "2026-02-26"
  last_verification_note: "vLLM 0.15.1, PyTorch 2.9.1+CUDA 12.8 on RTX PRO 6000 Blackwell Max-Q (SM120, 95GB VRAM). 11 models confirmed: 8 chat + Hunyuan-A13B-Instruct-FP8 + openai/gpt-oss-20b (MXFP4/Marlin, 13.72GB) + Llama-3.1-8B-Instruct (gated, needs HF_TOKEN). Embed/rerank confirmed. FLASH_ATTN backend auto-selected."
  status: VERIFIED
