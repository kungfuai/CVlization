name: vllm
capability: generative/llm
modalities: [text]
stability: experimental
resources:
  gpu: 1
  vram_gb: 8
  disk_gb: 8
image: cvl-vllm

presets:
  build:
    script: build.sh
    description: Build vLLM container (torch 2.9.1 + vLLM 0.19.0 + transformers 5.5.0)
  predict:
    script: predict.sh
    description: "Run a local vLLM inference (no server required). Default model: allenai/Olmo-3-7B-Instruct."
  serve:
    script: serve.sh
    description: Launch OpenAI-compatible vLLM server with auto-tuning
tags: [vllm, openai-api, llm, serving, text-generation, qwen, gemma]
tasks: [text_generation, serving]

verification:
  last_verified: "2026-05-22"
  last_verification_note: "vLLM 0.19.0 + transformers 5.5.0, PyTorch 2.9.1+CUDA 12.8 on RTX PRO 6000 Blackwell (SM120, 98GB VRAM). Verified: OLMo-3-7B-Instruct, Qwen/Qwen3-4B (think), Qwen/Qwen3.5-9B (VLM, text+image, think), google/gemma-4-e2b-it, nvidia/NVIDIA-Nemotron-Nano-9B-v2 (think, Mamba-2+Attn), nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16 (MoE+Mamba-2+Attn, 3.5B active), mistralai/Ministral-3-8B-Instruct-2512 (fp8 VLM, text+image). Uses devel base image for FP8 JIT (Ministral) and nvcc availability. 2026-05-22: verified Qwen/Qwen3.6-27B (GDN hybrid, VLM, reasoning; 51 GiB BF16) and Qwen/Qwen3.6-35B-A3B (MoE+GDN, ~3B active, VLM, reasoning; 66 GiB BF16) via stock predict.sh, no code changes — vLLM resolves them to Qwen3.5 arch classes (Qwen3_5ForConditionalGeneration / Qwen3_5MoeForConditionalGeneration); run with VLLM_ENFORCE_EAGER=1 to avoid GDN CUDA-graph issues. Also verified serve.sh for Qwen3.6-27B with VLLM_EXTRA_ARGS=\"--reasoning-parser qwen3 --enforce-eager\": the parser splits the think trace into the response `reasoning` field, leaving `content` clean. Also verified zai-org/GLM-4.7-Flash (MoE, arch Glm4MoeLiteForCausalLM, ~3B active, reasoning; 56 GiB BF16) via predict.py on the cvl-vllm image, no code changes — vLLM 0.19.0 has native support; serve.sh with VLLM_EXTRA_ARGS=\"--reasoning-parser glm45 --enforce-eager\" cleanly splits its reasoning into the response `reasoning` field."
  status: VERIFIED
