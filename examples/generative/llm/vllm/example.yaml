name: vllm
capability: generative/llm
modalities: [text]
stability: experimental
resources:
  gpu: 1
  vram_gb: 8
  disk_gb: 8
image: cvl-vllm

presets:
  build:
    script: build.sh
    description: Build vLLM container (vLLM 0.21.0 + torch 2.11.0 + CUDA 13.0 + transformers 5.9.0; base pytorch/pytorch:2.11.0-cuda13.0-cudnn9-devel; SM120 FlashInfer patches applied)
  predict:
    script: predict.sh
    description: "Run a local vLLM inference (no server required). Default model: allenai/Olmo-3-7B-Instruct."
  serve:
    script: serve.sh
    description: Launch OpenAI-compatible vLLM server with auto-tuning
tags: [vllm, openai-api, llm, serving, text-generation, qwen, gemma]
tasks: [text_generation, serving]

verification:
  last_verified: "2026-05-23"
  last_verification_note: "Bumped vLLM 0.19.0 -> 0.21.0; base image pytorch/pytorch:2.9.1-cuda12.8-cudnn9-devel -> pytorch/pytorch:2.11.0-cuda13.0-cudnn9-devel; transformers pin dropped (vLLM 0.21 resolves 5.9.0 and explicitly rejects 5.5.0). RTX PRO 6000 Blackwell (SM120, 98GB VRAM). SM120 needs three workarounds (all auto-applied): Dockerfile patches flashinfer.jit.core.check_cuda_arch to a no-op (false-positive 'requires sm75 or higher'); Dockerfile reorders vLLM's MoE backend priority list to put TRITON before FlashInfer on CUDA (FlashInfer BF16 kernels fail at 'No supported CUDA architectures for major versions [12]'); gpu_utils.py sets VLLM_USE_FLASHINFER_SAMPLER=0 for SM120+ (PyTorch-native sampler fallback). 2026-05-23 re-verified on vLLM 0.21.0: Qwen/Qwen3.6-27B (51 GiB, KV 311K), Qwen/Qwen3.6-35B-A3B (66 GiB, KV 376K), zai-org/GLM-4.7-Flash (56 GiB, KV 431K), nvidia/NVIDIA-Nemotron-Labs-3-Elastic-30B-A3B-BF16 (59 GiB, KV 1.6M), allenai/Olmo-3-7B-Instruct (14 GiB, KV 133K). 2026-05-23 new on vLLM 0.21.0: nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-BF16 (NemotronH_Nano_Omni_Reasoning_V3 omni-modal MoE+Mamba2+Attn, ~3B active, reasoning; 62 GiB; KV 1.75M tokens, 213x concurrency at 8K) — vLLM 0.19.0 lacked this arch; 0.21.0 maps it to NemotronH_Nano_VL_V2. Earlier 2026-05-22 (vLLM 0.19.0) verified: Qwen3.6-27B + Qwen3.6-35B-A3B (GDN hybrid, VLM, reasoning) via predict.sh; serve.sh + VLLM_EXTRA_ARGS=\"--reasoning-parser qwen3 --enforce-eager\" splits Qwen3.6 reasoning into the response `reasoning` field; GLM-4.7-Flash via predict.py; serve.sh + VLLM_EXTRA_ARGS=\"--reasoning-parser glm45 --enforce-eager\" splits GLM reasoning the same way. 2026-05-23 also re-verified on vLLM 0.21.0 (older verified set): Qwen/Qwen3-4B (think), Qwen/Qwen3.5-9B (VLM, think), google/gemma-4-e2b-it, NVIDIA-Nemotron-Nano-9B-v2, NVIDIA-Nemotron-3-Nano-30B-A3B-BF16. mistralai/Ministral-3-8B-Instruct-2512 (fp8 VLM, PixtralForConditionalGeneration; 9.8 GiB, KV 431K) re-verified after base bump — the CUDA 13.0 nvcc now compiles FlashInfer's compute_120f FP8 kernels (was the blocker on the CUDA 12.8 base). All 12 models verified on the new image with zero regressions."
  status: VERIFIED
