name: lance
capability: generative/unified_multimodal
modalities: [text, vision]
stability: experimental
resources:
  gpu: 1
  vram_gb: 40
  disk_gb: 40
image: cvl-lance
description: >
  Lance — unified multimodal model (3B params) by ByteDance Research.
  Single model handles text-to-image generation, image understanding (VQA),
  and image editing. Based on Qwen2.5-VL-3B with a shared LLM backbone,
  vision transformer, and WanVideoVAE decoder.

presets:
  build:
    script: build.sh
    description: Build Lance container (PyTorch 2.9.1 + CUDA 12.8 + Lance repo)
  predict:
    script: predict.sh
    description: >
      Run Lance inference. Default: text-to-image.
      Use --task t2i|x2t_image|image_edit to select mode.

tags:
  - lance
  - unified-multimodal
  - text-to-image
  - image-understanding
  - image-editing
  - vqa
  - bytedance
  - qwen2.5-vl
tasks:
  - text_to_image
  - image_understanding
  - image_editing
frameworks:
  - pytorch
  - transformers

verification:
  last_verified: 2026-07-12
  last_verification_note: "All three modes verified (t2i, x2t_image, image_edit) on RTX PRO 6000 Blackwell (98GB). Model cache 39GB. Sample data lazy-downloaded from zzsi/cvl. Host persistence via cvl run confirmed."
  status: VERIFIED
