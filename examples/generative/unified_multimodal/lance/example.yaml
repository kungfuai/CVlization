name: lance
capability: generative/unified_multimodal
modalities: [text, vision]
stability: experimental
resources:
  gpu: 1
  vram_gb: 40
  disk_gb: 40
image: cvl-lance
description: >
  Lance — unified multimodal model (3B params) by ByteDance Research.
  Single model handles text-to-image generation, image understanding (VQA),
  and image editing. Based on Qwen2.5-VL-3B with a shared LLM backbone,
  vision transformer, and WanVideoVAE decoder.

presets:
  build:
    script: build.sh
    description: Build Lance container (PyTorch 2.9.1 + CUDA 12.8 + Lance repo)
  predict:
    script: predict.sh
    description: >
      Run Lance inference. Default: text-to-image.
      Use --task t2i|x2t_image|image_edit to select mode.

tags:
  - lance
  - unified-multimodal
  - text-to-image
  - image-understanding
  - image-editing
  - vqa
  - bytedance
  - qwen2.5-vl
tasks:
  - text_to_image
  - image_understanding
  - image_editing
frameworks:
  - pytorch
  - transformers

verification:
  last_verified: 2026-07-19
  last_verification_note: >
    All three modes verified (t2i, x2t_image, image_edit) at 768px/5 steps on
    RTX PRO 6000 Blackwell (98 GB). Peak VRAM measured at 200ms polling:
    t2i 35.9 GB, x2t_image 29.3 GB, image_edit 31.3 GB (process-level).
    Baseline 15 MiB idle, fully released post-run. Model cache 39 GB.
    Sample data lazy-downloaded from zzsi/cvl. Host persistence via cvl run confirmed.
    40 GB GPU compatibility not independently tested.
  peak_vram_gb:
    t2i: 35.9
    x2t_image: 29.3
    image_edit: 31.3
  tested_gpu: "NVIDIA RTX PRO 6000 Blackwell Max-Q (98 GB)"
  status: VERIFIED
