# Smoke test: 4 GPUs, Wan-1.3B teacher (self-distillation), 50 iters
# Inherits from configs/self_forcing_dmd.yaml; overrides below.
generator_ckpt: checkpoints/ode_init.pt
generator_fsdp_wrap_strategy: size
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
real_name: Wan2.1-T2V-1.3B   # KEY CHANGE: 1.3B teacher (no Wan-14B needed)
text_encoder_fsdp_wrap_strategy: size
denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
ts_schedule: false
num_train_timestep: 1000
timestep_shift: 5.0
guidance_scale: 3.0
denoising_loss_type: flow
mixed_precision: true
seed: 0
wandb_host: WANDB_HOST
wandb_key: WANDB_KEY
wandb_entity: WANDB_ENTITY
wandb_project: WANDB_PROJECT
sharding_strategy: hybrid_full
lr: 2.0e-06
lr_critic: 4.0e-07
beta1: 0.0
beta2: 0.999
beta1_critic: 0.0
beta2_critic: 0.999
data_path: vidprom_filtered_extended.txt
batch_size: 1
ema_weight: 0.99
ema_start_step: 200
total_batch_size: 4   # effective batch on 4 GPUs
log_iters: 25   # save checkpoint every 25 iters
max_steps: 50   # KEY CHANGE: smoke test stops at 50
negative_prompt: "色调艳丽，过曝，静态"
dfake_gen_update_ratio: 5
text_encoder_cpu_offload: true
image_or_video_shape:
- 1
- 21
- 16
- 30
- 52
num_training_frames: 21
distribution_loss: dmd
trainer: score_distillation
gradient_checkpointing: true
num_frame_per_block: 3
load_raw_video: false
model_kwargs:
  timestep_shift: 5.0
