name: lingbot_video
image: cvlization/lingbot_video:latest
capability: generative/video_generation
modalities:
  - vision
  - text
  - video
datasets: []
stability: experimental
resources:
  gpu_count: 1
  vram_gb: 80  # MoE 30B peak at 81 frames 832x480; Dense 1.3B ~8GB
  disk_gb: 130  # MoE weights ~121GB; Dense ~5GB
presets:
  build:
    script: build.sh
    description: Build the Docker image
  predict:
    script: predict.sh
    description: Generate video from text prompt (or text+image)
    path_args:
      - flag: "--prompt-json"
        type: file
      - flag: "--image"
        type: file
      - flag: "--output"
        type: file
  test:
    script: test.sh
    description: Run smoke test with minimal settings
tasks:
  - text_to_video
  - text_to_image
  - image_to_video
frameworks:
  - pytorch
  - diffusers
  - transformers
tags:
  - video-generation
  - moe
  - mixture-of-experts
  - embodied-intelligence
  - world-model
  - lingbot
  - robbyant
  - diffusion
  - dit
description: >
  LingBot-Video is the first large-scale open-source MoE video foundation model,
  designed for embodied intelligence. It offers two variants: a dense 1.3B model
  (~8GB VRAM) and a MoE 30B-A3B model (~3B active parameters, ~80GB peak VRAM).
  Trained on 70,000+ hours of embodied and web video data with physical-rationality
  and task-completion reward alignment. Supports text-to-video, text-to-image,
  and text+image-to-video generation. Best results with structured JSON prompts
  (upstream Rewriter format); raw text prompts are best-effort.

verification:
  status: PARTIAL
  last_verified: "2026-07-14"
  last_verification_note: >
    Verified on RTX PRO 6000 Blackwell (98GB VRAM, sm120). Upstream pinned to commit
    a638721. With structured JSON prompts (--prompt-json): T2V dense (81f, 40 steps,
    ~2m24s, clean coherent output), TI2V dense (41f, 40 steps, ~58s, conditioning
    preserved, coherent throughout). Raw text prompts produce lower quality. T2I MoE
    (clear image). T2I dense: poor quality. MoE T2V not re-tested with structured
    prompt (121GB download constraint). batch_cfg blocked: requires flash_attn_3
    (Hopper), prebuilt wheels lack sm120 kernels. Refiner not exposed (base generation
    only). FlashAttention v2 removed (unused by wrapper; upstream runner needs
    LINGBOT_QWEN_ATTN_IMPLEMENTATION=sdpa env var, not FA2 wheel). Upstream runner
    parity check: dense T2V with same structured prompt via lingbot_video.runner
    produces equivalent quality (121f at seed 42). Duration-to-num_frames derivation
    implemented (upstream formula). Canonical TI2V input linked. Dependency stack:
    torch 2.7.0+cu128, diffusers 0.39.0, transformers 5.13.1. cvl run from external
    cwd confirmed. Demo artifacts at
    https://huggingface.co/datasets/zzsi/cvl/tree/main/lingbot_video.
