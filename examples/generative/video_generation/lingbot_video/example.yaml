name: lingbot_video
image: cvlization/lingbot_video:latest
capability: generative/video_generation
modalities:
  - vision
  - text
  - video
datasets: []
stability: experimental
resources:
  gpu_count: 1
  vram_gb: 80  # MoE 30B peak at 81 frames 832x480; Dense 1.3B ~8GB
  disk_gb: 130  # MoE weights ~121GB; Dense ~5GB
presets:
  build:
    script: build.sh
    description: Build the Docker image
  predict:
    script: predict.sh
    description: Generate video from text prompt (or text+image)
    path_args:
      - flag: "--image"
        type: file
      - flag: "--output"
        type: file
  test:
    script: test.sh
    description: Run smoke test with minimal settings
tasks:
  - text_to_video
  - text_to_image
  - image_to_video
frameworks:
  - pytorch
  - diffusers
  - transformers
tags:
  - video-generation
  - moe
  - mixture-of-experts
  - embodied-intelligence
  - world-model
  - lingbot
  - robbyant
  - diffusion
  - dit
description: >
  LingBot-Video is the first large-scale open-source MoE video foundation model,
  designed for embodied intelligence. It offers two variants: a dense 1.3B model
  (~8GB VRAM) and a MoE 30B-A3B model (~3B active parameters, ~80GB peak VRAM).
  Trained on 70,000+ hours of embodied and web video data with physical-rationality
  and task-completion reward alignment. Supports text-to-video, text-to-image,
  and text+image-to-video generation. Requires detailed multi-sentence prompts.

verification:
  status: PARTIAL
  last_verified: "2026-07-12"
  last_verification_note: >
    Verified on RTX PRO 6000 Blackwell (98GB VRAM). Tested: T2V dense (81f, 40 steps,
    ~2m24s, recognizable but with structural artifacts), T2V MoE (81f, 40 steps,
    ~6m27s, ~80GB peak VRAM, some noise/overexposure in frames), T2I MoE (clear image),
    TI2V dense (41f, conditioning preserved initially, degrades toward end). T2I dense:
    poor quality. Short prompts produce abstract output; detailed prompts required.
    MoE weights ~121GB download. cvl run from external cwd confirmed with host
    persistence. Demo artifacts at
    https://huggingface.co/datasets/zzsi/cvl/tree/main/lingbot_video.
