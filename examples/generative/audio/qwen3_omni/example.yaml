name: qwen3-omni
capability: generative/audio
modalities:
  - audio
  - text
  - image
  - video
datasets:
  - custom
stability: experimental
resources:
  gpu: 1
  vram_gb: 80
  disk_gb: 65
image: qwen3-omni
presets:
  build:
    script: build.sh
    description: Build the Docker image (PyTorch CUDA + transformers + compressed-tensors + qwen-omni-utils + audio libs)
  predict:
    script: predict.sh
    description: Multimodal spoken dialogue (audio in -> text + 24 kHz audio out) via Qwen3-Omni-30B-A3B-Instruct
    path_args:
      - flag: "--audio"
        type: file
      - flag: "--output"
        type: file
  test:
    script: test.sh
    description: AWQ-4bit smoke run on the bundled CVL dialogue prompt
tags:
  - qwen3
  - qwen3-omni
  - omni
  - spoken-dialogue
  - speech-to-speech
  - multimodal
  - moe
  - awq
  - compressed-tensors
tasks:
  - spoken_dialogue
  - speech_to_speech
  - audio_understanding
  - multimodal_chat
frameworks:
  - pytorch
  - transformers
description: Multimodal dialogue (audio / image / video / text in, text + 24 kHz audio out) via Qwen/Qwen3-Omni-30B-A3B-Instruct. 30B-A3B MoE (~3B active) with three baked-in voices (Ethan, Chelsie, Aiden). Default is bf16 full model (~80 GB VRAM at 15 s ctx); the cpatonn AWQ-4bit (compressed-tensors) option is wired in but currently produces garbled output under transformers 5.9 -- track upstream for a fix. Apache-2.0, not gated.

verification:
  last_verified: "2026-05-24"
  last_verification_note: "End-to-end smoke verified on RTX PRO 6000 Blackwell (SM120, 98 GB VRAM). Docker build OK (image ~14 GB; pytorch 2.7.1+cuda12.8 runtime + transformers 5.9.0 + compressed-tensors 0.12.0 + qwen-omni-utils 0.0.9). bf16 default (Qwen/Qwen3-Omni-30B-A3B-Instruct): self-dialogue on the bundled flashlabs_chroma/hi_who_are_you.wav sample produced a coherent English text reply ('Hello! I am Qwen-Omni, a multimodal large-scale language model developed by Alibaba''s Tongyi Lab. How can I assist you?') and a 24 kHz mono PCM wav (~380 KB, 7.90 s) in 29 s wall on cached weights. Peak VRAM ~70 GiB on a 1.5 s audio prompt (in line with upstream's 78.85 GB figure at 15 s ctx). Host persistence confirmed (output landed in cwd via /mnt/cvl/workspace mount). CVL CLI discovery (`cvl info qwen3-omni`) works. Caveats: (a) the cpatonn AWQ-4bit checkpoint (--quant 4bit) is wired in but currently produces garbled tokens under transformers 5.9 + compressed-tensors 0.11/0.12 -- the runtime dequant disagrees with how the ckpt was packed (transformers 4.57.0.dev0 + compressed-tensors 0.11.0); documented as known issue in README; (b) image / video / text-only input paths are not wired into the wrapper (audio-in only) -- Qwen3-Omni itself supports them and build_conversation() is the extension point; (c) flash-attn is opt-in (--attn-impl flash_attention_2 requires a separately installed wheel) -- default is SDPA."
  status: VERIFIED
