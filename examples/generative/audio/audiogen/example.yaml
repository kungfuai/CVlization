name: audiogen
capability: generative/audio
modalities:
  - text
  - audio
datasets:
  - custom
stability: experimental
resources:
  gpu: 1
  vram_gb: 16
  disk_gb: 20
presets:
  build:
    script: build.sh
    description: Build the Docker image
  predict:
    script: predict.sh
    description: Generate sound effects from text
    path_args:
      - flag: "--input"
        type: file
      - flag: "--output"
        type: file
      - flag: "--prompt-audio"
        type: file
  test:
    script: test.sh
    description: Run smoke test
tags:
  - text-to-sound
  - sound-generation
  - audio-generation
  - audiocraft
  - audiogen
  - meta
  - pytorch
tasks:
  - text_to_sound
  - audio_generation
  - sound_generation
frameworks:
  - pytorch
  - audiocraft
description: Text-to-sound generation with Meta AudioCraft AudioGen
verification:
  last_verified: "2026-04-15"
  last_verification_note: "Verified cvl info, cvl run build, cvl run test with --prompt-audio sample, zzsi/cvl sample data download, and cvl run predict host output persistence on NVIDIA RTX PRO 6000 Blackwell Max-Q with PyTorch 2.9.1/CUDA 12.8. Full facebook/audiogen-medium inference with --prompt-audio sample passed: 16 kHz mono WAV, 10 seconds."
