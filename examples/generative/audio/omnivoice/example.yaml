name: omnivoice
capability: generative/audio
modalities:
  - text
  - audio
datasets:
  - custom
stability: experimental
resources:
  gpu: 1
  vram_gb: 4
  disk_gb: 10
presets:
  build:
    script: build.sh
    description: Build the Docker image
  predict:
    script: predict.sh
    description: Generate speech from text (voice cloning or voice design)
    path_args:
      - flag: "--input"
        type: file
      - flag: "--output"
        type: file
      - flag: "--ref-audio"
        type: file
  test:
    script: test.sh
    description: Run smoke tests for voice cloning and voice design modes
tags:
  - tts
  - text-to-speech
  - speech-synthesis
  - voice-cloning
  - voice-design
  - multilingual
  - zero-shot
  - diffusion
  - k2-fsa
tasks:
  - text_to_speech
  - voice_cloning
frameworks:
  - pytorch
  - transformers
description: >
  Massively multilingual zero-shot TTS (646 languages) with voice cloning and
  voice design using k2-fsa OmniVoice 0.6B. Code is Apache-2.0; pretrained
  weights are CC-BY-NC due to training-data constraints.
verification:
  status: PARTIAL
  last_verified: "2026-07-13"
  last_verification_note: >
    Build, voice design, voice cloning, cvl info, cvl run (both modes from
    external cwd), model caching (3.1 GB + 1.6 GB Whisper), cache reuse, and
    host persistence all pass on RTX PRO 6000 Blackwell. Peak ~2.7 GB VRAM
    (float16). ASR intelligibility (jiwer Levenshtein WER): English raw WER
    14.3%/0.0% (punctuation-only difference, normalized WER 0.0%), Chinese
    raw CER 13.6% (normalized 0.0%). Whisper large-v3-turbo rev 41f01f3f.
    ECAPA-TDNN speaker similarity 0.83 (rev 0f99f2d0). OmniVoice rev
    c5fdb5cc. Multilingual: English and Chinese locally verified; 644 other
    languages upstream-claimed. PARTIAL: subjective voice-character, accent
    fidelity, and perceptual quality deferred to human listening review.
    Reproducible metrics at zzsi/cvl omnivoice/verification_metrics.json.
