name: flashlabs-chroma
capability: generative/audio
modalities:
  - audio
  - text
datasets:
  - custom
stability: experimental
resources:
  gpu: 1
  vram_gb: 8
  disk_gb: 14
image: flashlabs-chroma
presets:
  build:
    script: build.sh
    description: Build the Docker image (PyTorch CUDA + transformers 5.0.0rc0 + bitsandbytes + audio libs)
  predict:
    script: predict.sh
    description: Turn-based spoken dialogue with optional voice cloning (user audio in -> Chroma audio out)
    path_args:
      - flag: "--audio"
        type: file
      - flag: "--prompt-audio"
        type: file
      - flag: "--output"
        type: file
  test:
    script: test.sh
    description: Self-clone smoke run on the bundled CVL sample
tags:
  - chroma
  - flashlabs
  - spoken-dialogue
  - speech-to-speech
  - voice-cloning
  - multimodal
  - qwen2.5-omni
  - llama3
  - mimi
tasks:
  - spoken_dialogue
  - speech_to_speech
  - voice_cloning
frameworks:
  - pytorch
  - transformers
description: Turn-based spoken dialogue with voice cloning via FlashLabs Chroma-4B (Qwen2.5-Omni-3B reasoner + Llama3 backbone + Llama3 decoder + Mimi codec). Runs in ~8GB VRAM at bf16, ~4GB at 4-bit (bitsandbytes). Apache-2.0; HF model is auto-gated.

verification:
  last_verified: "2026-05-24"
  last_verification_note: "Full verify-inference-example skill checklist passed on RTX PRO 6000 Blackwell (98 GB VRAM, SM120) after HF gate acceptance. Docker build OK (image ~14 GB; pytorch 2.7.1+cuda12.8 runtime + transformers 5.0.0rc0 + bitsandbytes). End-to-end smoke verified via BOTH ./test.sh and `cvl run flashlabs-chroma predict` (from /tmp/cvl_stt_test/): self-clone on the bundled CVL sample (zzsi/cvl::livetalk/example.wav) produced a 24 kHz mono PCM16 wav (~983 KB, ~20 s) in 2 m 10 s wall (cached weights; first-run cold pull is ~3 min for the three safetensors shards). Host persistence confirmed. CVL CLI discovery (`cvl info flashlabs-chroma`) works; shellcheck clean. Voice-clone default is self-clone so no celebrity reference audio ships in the preset. Caveats: (a) HF model is auto-gated -- first run requires HF_TOKEN with gate accepted at huggingface.co/FlashLabs/Chroma-4B; (b) peak GPU memory not reliably measured (1 Hz polling observed only ~600 MiB during inference; device_map='auto' with low_cpu_mem_usage may CPU-offload portions); (c) transformers pinned at 5.0.0rc0 to match upstream -- newer versions unvalidated."
  status: VERIFIED
