name: lingbot_vision
capability: perception/vision_pretraining
modalities:
  - vision
stability: experimental
resources:
  gpu:
    count: 1
    vram_gb: 2
  cpu_cores: 4
  ram_gb: 16
  disk_gb: 5
presets:
  build:
    script: build.sh
    description: Build the LingBot-Vision inference image
  predict:
    script: predict.sh
    description: Run dense feature extraction with PCA visualisation
tags:
  - lingbot-vision
  - dense-spatial-perception
  - vision-pretraining
  - ssl
  - vit
  - pca
  - self-supervised
  - boundary-aware
  - pytorch
frameworks:
  - pytorch
description: |
  LingBot-Vision dense spatial perception backbone. Extracts boundary-aware
  patch features via a ViT pretrained with masked boundary modelling, and
  visualises them with PCA projection to RGB. Only ViT-L (large) is verified;
  small, base, and giant variants are available but untested.
datasets: []
image: lingbot-vision
model_source: robbyant/lingbot-vision-vit-large
license: Apache-2.0
repository: https://github.com/Robbyant/lingbot-vision
verification:
  status: PARTIAL
  last_verified: "2026-07-20"
  last_verification_note: "PyTorch 2.9.1+CUDA 12.8 on NVIDIA RTX PRO 6000 Blackwell Max-Q (GPU-dd55f371-5b6e-3708-2aa5-34ef3e875ee0, 97887 MiB). ViT-L PCA feature extraction on 2 canonical images. Device peak 1885 MiB, process peak 1862 MiB (29 samples at 150ms). Baseline 15 MiB, release to 15 MiB. Model cached in ~/.cache/huggingface. Canonical inputs and panels uploaded to zzsi/cvl/lingbot_vision/. CVL CLI verified. PARTIAL: only ViT-L tested; S/B/G untested."
