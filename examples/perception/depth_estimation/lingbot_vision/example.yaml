name: lingbot_vision
capability: perception/depth_estimation
modalities:
  - vision
stability: experimental
resources:
  gpu:
    count: 1
    vram_gb: 2
  cpu_cores: 4
  ram_gb: 16
  disk_gb: 5
presets:
  build:
    script: build.sh
    description: Build the LingBot-Vision inference image
  predict:
    script: predict.sh
    description: Run dense feature extraction with PCA visualisation
tags:
  - lingbot-vision
  - dense-spatial-perception
  - vision-pretraining
  - depth-estimation
  - vit
  - pca
  - self-supervised
  - boundary-aware
  - pytorch
frameworks:
  - pytorch
description: |
  LingBot-Vision dense spatial perception backbone. Extracts boundary-aware
  patch features via a ViT pretrained with masked boundary modelling, and
  visualises them with PCA projection to RGB.
datasets: []
image: lingbot-vision
model_source: robbyant/lingbot-vision-vit-large
license: Apache-2.0
repository: https://github.com/Robbyant/lingbot-vision
verification:
  status: PARTIAL
  last_verified: "2026-07-14"
  last_verification_note: "PyTorch 2.9.1+CUDA 12.8 on RTX PRO 6000 Blackwell. ViT-L PCA feature extraction on 2 images (indoor scene, person portrait). Peak VRAM ~1.9 GB. Model cached in ~/.cache/huggingface, second run reuses without re-download. Sample images lazy-downloaded from zzsi/cvl. CVL CLI (cvl info/run) verified from external cwd. PARTIAL: sample images reuse existing zzsi/cvl prefixes (no HF write token for dedicated lingbot_vision/ prefix)."
