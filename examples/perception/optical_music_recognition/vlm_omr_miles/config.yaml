# Miles GRPO for VLM OMR
# Uses Qwen3.5-9B (VLM) merged SFT checkpoint on synthetic Level 9.

model:
  # Merged SFT checkpoint inside the SFT directory mount.
  # train.sh mounts $SFT_DIR -> /sft_workspace
  name: "/sft_workspace/outputs/tamqjf4k_merged"

dataset:
  name: "zzsi/synthetic-scores"
  config: "level9"
  split: "train"
  # null → use full split (3115 samples for Level 9)
  max_samples: null
  image_key: "image"

training:
  output_dir: "outputs"
  num_rollout: 20
  rollout_batch_size: 2
  n_samples_per_prompt: 8
  global_batch_size: 16
  max_response_len: 4096
  temperature: 0.7
  learning_rate: 1.0e-6
  weight_decay: 0.1
  save_interval: 10
  rm_type: "custom"
  num_gpus: 2                  # use both GPUs
  max_tokens_per_gpu: 4096
  sglang_mem_fraction: 0.4

grpo:
  kl_coef: 0.5
  kl_type: "low_var_kl"
  entropy_coef: 0.0
  eps_clip: 0.2
  eps_clip_high: 0.28
