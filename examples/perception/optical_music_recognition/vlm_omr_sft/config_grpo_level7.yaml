# GRPO on synthetic Level 7 MXC2 — strong SFT baseline (82%)
# Uses combined reward (LCS pitch + part count + length control)
# Start from the Level 7 MXC2 curriculum adapter.

model:
  name: "unsloth/Qwen3.5-9B"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  sft_adapter: "outputs/tamqjf4k/final_model"  # L9 MXC2 adapter

lora:
  r: 32
  alpha: 32
  dropout: 0
  finetune_vision_layers: false
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

dataset:
  repo: "zzsi/synthetic-scores"
  config: "level7"
  split: "train"
  drop_beams: true

wandb:
  project: "openscore-omr"
  run_name: null

training:
  output_dir: "outputs/grpo_level7"
  learning_rate: 1.0e-6
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_generations: 4
  max_prompt_length: 512
  max_completion_length: 4096
  max_steps: 100
  save_steps: 25
  logging_steps: 1
  warmup_ratio: 0.1
  max_grad_norm: 0.1
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  optim: "adamw_torch_fused"
  beta: 0.5            # higher KL penalty to stay close to SFT policy
  loss_type: "dr_grpo"
  seed: 3407
