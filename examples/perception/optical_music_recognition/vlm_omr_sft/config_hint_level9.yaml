# Level 9 SFT with Audiveris hints in context.
# Continues from the existing L9 MXC2 adapter (outputs/tamqjf4k/final_model).
# 1 epoch on hint-augmented data to teach the model to use Audiveris hints
# without retraining from scratch.

model:
  name: "unsloth/Qwen3.5-9B"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  max_length: 16384        # image (~975) + compressed hint (~1500) + target (~3000) + buffer
  chat_template: null

# Resume from existing SFT adapter so the model already speaks MXC2
resume_adapter: "outputs/tamqjf4k/final_model"

lora:
  r: 32
  alpha: 32
  dropout: 0
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

dataset:
  repo: "zzsi/synthetic-scores"
  config: "level9"
  split: "train"
  dev_split: "dev"
  shuffle: true
  target_format: "mxc2"
  drop_beams: true
  columns:
    image: "image"
    musicxml: "musicxml"
    id: "score_id"
    label: "level"

wandb:
  project: "openscore-omr"
  run_name: null
  log_examples_every_n_steps: 200
  n_examples: 3
  inference_max_new_tokens: 4096

training:
  output_dir: "outputs"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  max_grad_norm: 0.1
  warmup_ratio: 0.03
  num_train_epochs: 1            # continuation training, 1 epoch is enough
  learning_rate: 1.0e-5          # lower LR since we resume
  logging_steps: 5
  save_steps: 400
  val_steps: 200
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  test_after_training: false     # we'll do dedicated hint eval separately
