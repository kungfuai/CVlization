# Openscore lieder with MXC2 format + curriculum from Level 9 MXC2 adapter.
# 86% of pages fit in 8K with MXC2+drop_beams (was 42% with MXC).
# Launch with: --resume-adapter outputs/<l9-mxc2-run>/final_model

model:
  name: "unsloth/Qwen3.5-9B"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  max_length: 8192
  chat_template: null

lora:
  r: 32
  alpha: 32
  dropout: 0
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

dataset:
  repo: "zzsi/openscore"
  config: "pages_transcribed"
  split: "train"
  dev_split: "dev"
  shuffle: true
  target_format: "mxc2"
  drop_beams: true
  corpora:
    - lieder

wandb:
  project: "openscore-omr"
  run_name: null
  log_examples_every_n_steps: 200
  n_examples: 3
  inference_max_new_tokens: 8192

training:
  output_dir: "outputs"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  max_grad_norm: 0.1
  warmup_ratio: 0.03
  num_train_epochs: 3
  learning_rate: 5.0e-5
  logging_steps: 1
  save_steps: 1000
  val_steps: 200
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  test_after_training: true
