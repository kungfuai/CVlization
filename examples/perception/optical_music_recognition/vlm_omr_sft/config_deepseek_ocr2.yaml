# DeepSeek-OCR-2 3B OMR SFT Configuration
# OCR-specialized 3B model (Jan 2026); OmniDocBench outperforms Gemini-3 Pro
# DeepEncoder V2: reads in human logical order (global context first)
#
# NOTE: This model uses a custom <|User|>/<|Assistant|> conversation format and
# requires DeepSeekOCR2DataCollator (not UnslothVisionDataCollator). Training
# with the current pipeline (SFTTrainer) is NOT yet supported. Needs a separate
# train_deepseek_ocr2.py script following the unsloth notebook pattern.

model:
  name: "unsloth/DeepSeek-OCR-2"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  max_length: 4096
  chat_template: null        # built-in template via trust_remote_code
  snapshot_download: true    # must download to local path before loading
  trust_remote_code: true    # custom DeepseekOCR2ForCausalLM architecture
  auto_model: true           # pass auto_model=AutoModel to FastVisionModel
  unsloth_force_compile: true

lora:
  r: 16
  alpha: 16
  dropout: 0
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

dataset:
  repo: "zzsi/openscore"
  config: "pages_transcribed"
  split: "train"
  corpora: ["lieder"]
  shuffle: true

wandb:
  project: "openscore-omr"
  run_name: null
  log_examples_every_n_steps: 100
  n_examples: 4
  inference_max_new_tokens: 2048

training:
  output_dir: "outputs"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  num_train_epochs: 2
  learning_rate: 2.0e-4
  logging_steps: 1
  save_steps: 500
  val_steps: 250
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  test_after_training: true
