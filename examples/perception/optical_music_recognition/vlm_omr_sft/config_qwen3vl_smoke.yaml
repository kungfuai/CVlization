# Smoke test: Qwen3-VL-8B-Instruct on Level 7a (Phase 1 of the migration plan).
# 100 steps on a small slice to verify the model works in our unsloth pipeline
# WITHOUT the image-token mismatch bug we hit on Qwen3.5-9B.

model:
  name: "unsloth/Qwen3-VL-8B-Instruct"   # proven across Miles/verl/ms-swift/unsloth
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  max_length: 8192
  chat_template: null

lora:
  r: 32
  alpha: 32
  dropout: 0
  finetune_vision_layers: false        # we proved this is unnecessary
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

dataset:
  repo: "zzsi/synthetic-scores"
  config: "level7a"
  split: "train[:500]"                 # smoke-test slice
  dev_split: "dev[:50]"
  shuffle: true
  target_format: "mxc2"
  drop_beams: true
  columns:
    image: "image"
    musicxml: "musicxml"
    id: "score_id"
    label: "level"

wandb:
  project: "openscore-omr"
  run_name: null
  log_examples_every_n_steps: 50
  n_examples: 2
  inference_max_new_tokens: 4096

training:
  output_dir: "outputs"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  max_grad_norm: 0.1
  warmup_ratio: 0.05
  max_steps: 100                       # smoke only
  learning_rate: 5.0e-5
  logging_steps: 5
  save_steps: 100
  val_steps: 50
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  test_after_training: false
