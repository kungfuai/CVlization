# GRPO v6: 16 generations (was 4), Level 9 MXC2
# Tests whether more variance alone fixes the no-improvement problem.
# Literature: DeepSeek-R1 uses 16 generations per prompt.

model:
  name: "unsloth/Qwen3.5-9B"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  sft_adapter: "outputs/tamqjf4k/final_model"

lora:
  r: 32
  alpha: 32

dataset:
  repo: "zzsi/synthetic-scores"
  config: "level9"
  split: "train"
  drop_beams: true

wandb:
  project: "openscore-omr"

training:
  output_dir: "outputs/grpo_v6_level9"
  learning_rate: 1.0e-6       # slightly higher than v5 (was 5e-7)
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_generations: 16         # 4x more than v5
  max_prompt_length: 512
  max_completion_length: 4096
  max_steps: 50               # diagnostic first
  save_steps: 25
  logging_steps: 1
  warmup_ratio: 0.1
  max_grad_norm: 0.1
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  optim: "adamw_torch_fused"
  beta: 0.5                   # lower than v5 (was 1.0) — allow more exploration
  loss_type: "dr_grpo"
  seed: 3407
