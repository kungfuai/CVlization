# PDMX voice+piano with MXC2 format
# 19K pages of real music from diverse composers.
# Curriculum from Level 9 MXC2 adapter (knows MXC2 format + basic music reading).

model:
  name: "unsloth/Qwen3.5-9B"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  max_length: 8192
  chat_template: null

lora:
  r: 32
  alpha: 32
  dropout: 0
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

dataset:
  repo: "zzsi/pdmx-omr"
  config: "pages-voice+piano"
  split: "train"
  dev_split: "dev"
  shuffle: true
  target_format: "mxc2"
  drop_beams: true

wandb:
  project: "openscore-omr"
  run_name: null
  log_examples_every_n_steps: 500
  n_examples: 3
  inference_max_new_tokens: 8192

training:
  output_dir: "outputs"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  max_grad_norm: 0.1
  warmup_ratio: 0.03
  num_train_epochs: 2
  learning_rate: 5.0e-5
  logging_steps: 1
  save_steps: 2000
  val_steps: 500
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  test_after_training: true
