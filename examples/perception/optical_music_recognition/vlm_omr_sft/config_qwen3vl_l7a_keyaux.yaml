# Qwen3-VL Level 7a SFT with auxiliary key-signature task (data mixing).
# key_aux_ratio=0.25 mixes in key-only examples to fix the loss-insensitivity
# bottleneck: model fails on key signatures {-3,-1,+1,+2,+3} (15-32% acc).

model:
  name: "unsloth/Qwen3-VL-8B-Instruct"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  max_length: 8192
  chat_template: null

lora:
  r: 32
  alpha: 32
  dropout: 0
  finetune_vision_layers: true     # THE CHANGE — let vision encoder adapt
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

dataset:
  repo: "zzsi/synthetic-scores"
  config: "level7a"
  split: "train"
  dev_split: "dev"
  shuffle: true
  target_format: "mxc2"
  drop_beams: true
  key_aux_ratio: 0.25            # mix in 25% key-signature-only examples
  columns:
    image: "image"
    musicxml: "musicxml"
    id: "score_id"
    label: "level"

wandb:
  project: "openscore-omr"
  run_name: null
  log_examples_every_n_steps: 200
  n_examples: 3
  inference_max_new_tokens: 4096

training:
  output_dir: "outputs"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  max_grad_norm: 0.1
  warmup_ratio: 0.03
  num_train_epochs: 3
  learning_rate: 5.0e-5
  logging_steps: 5
  save_steps: 600
  val_steps: 200
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  test_after_training: false
