# Qwen3.5-9B OMR SFT — MXC target format
# 3× larger LM than Ministral-3; tests if bigger model learns pitch.
# Unified early-fusion VLM (Feb 2026); OCRBench 89.2, OmniDocBench 87.7

model:
  name: "unsloth/Qwen3.5-9B"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  max_length: 4096
  chat_template: null

lora:
  r: 16
  alpha: 16
  dropout: 0
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

dataset:
  repo: "zzsi/openscore"
  config: "pages_transcribed"
  split: "train"
  corpora: ["lieder"]
  shuffle: true
  target_format: "mxc"

wandb:
  project: "openscore-omr"
  run_name: null
  log_examples_every_n_steps: 100
  n_examples: 4
  inference_max_new_tokens: 2048

training:
  output_dir: "outputs"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  num_train_epochs: 2
  learning_rate: 2.0e-4
  logging_steps: 1
  save_steps: 500
  val_steps: 250
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  test_after_training: true
