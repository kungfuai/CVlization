# DeepSeek-OCR-2 3B OMR SFT — MXC target, 3 epochs
# OCR-specialized 3B model. Uses train_deepseek_ocr2.py (not train.py).

model:
  name: "unsloth/DeepSeek-OCR-2"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  max_length: 4096
  chat_template: null
  snapshot_download: true
  trust_remote_code: true
  auto_model: true
  unsloth_force_compile: true

lora:
  r: 32
  alpha: 32
  dropout: 0
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

dataset:
  repo: "zzsi/openscore"
  config: "pages_transcribed"
  split: "train"
  corpora: ["lieder"]
  shuffle: true
  target_format: "mxc"

wandb:
  project: "openscore-omr"
  run_name: null
  log_examples_every_n_steps: 200
  n_examples: 4
  inference_max_new_tokens: 2048

training:
  output_dir: "outputs"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  num_train_epochs: 3
  learning_rate: 2.0e-4
  logging_steps: 1
  save_steps: 500
  val_steps: 500
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  test_after_training: true
