# v2 resume: continue training from cp600, val disabled to avoid OOM.

model:
  name: "unsloth/Qwen3-VL-8B-Instruct"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  max_length: 4096
  chat_template: null

lora:
  r: 32
  alpha: 32
  dropout: 0
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

dataset:
  repo: "zzsi/synthetic-scores"
  config: "level7a"
  extra_configs: ["level9", "level8", "level6", "level5"]
  split: "train"
  dev_split: "dev"
  shuffle: true
  target_format: "mxc2"
  drop_beams: true
  key_aux_only: true
  key_aux_ratio: 1.0
  key_cot: true
  columns:
    image: "image"
    musicxml: "musicxml"
    id: "score_id"
    label: "level"

wandb:
  project: "openscore-omr"
  run_name: null
  log_examples_every_n_steps: 5000   # effectively disable to avoid OOM
  n_examples: 1
  inference_max_new_tokens: 128

training:
  output_dir: "outputs"
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 1
  max_grad_norm: 0.1
  warmup_ratio: 0.03
  num_train_epochs: 2
  learning_rate: 5.0e-5
  logging_steps: 20
  save_steps: 1000
  val_steps: 0                       # DISABLE validation to avoid OOM
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  test_after_training: false
