# Ministral-3 3B OMR SFT — LoRA r=8 (reduced from r=32 to combat overfitting)

model:
  name: "unsloth/Ministral-3-3B-Instruct-2512-unsloth-bnb-4bit"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  max_length: 4096
  chat_template: null  # uses model's built-in template

lora:
  r: 8
  alpha: 8
  dropout: 0
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

dataset:
  repo: "zzsi/openscore"
  config: "pages_transcribed"
  split: "train"
  corpora: ["lieder"]
  shuffle: true

wandb:
  project: "openscore-omr"
  run_name: null
  log_examples_every_n_steps: 100
  n_examples: 4
  inference_max_new_tokens: 2048

training:
  output_dir: "outputs"
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  max_grad_norm: 0.3
  warmup_ratio: 0.03
  num_train_epochs: 2
  learning_rate: 2.0e-4
  logging_steps: 1
  save_steps: 500
  val_steps: 250
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  test_after_training: true
