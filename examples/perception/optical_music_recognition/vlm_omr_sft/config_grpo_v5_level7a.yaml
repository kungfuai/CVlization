# GRPO v5: fixed reward (SequenceMatcher), vision=False SFT adapter
# SFT adapter: outputs/4sqiu4ck/final_model (97% on Level 7a, vision=False)
# No merge needed — adapter is GRPO-compatible directly.

model:
  name: "unsloth/Qwen3.5-9B"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  sft_adapter: "outputs/4sqiu4ck/final_model"

lora:
  r: 32
  alpha: 32

dataset:
  repo: "zzsi/synthetic-scores"
  config: "level7a"
  split: "train"
  drop_beams: true

wandb:
  project: "openscore-omr"

training:
  output_dir: "outputs/grpo_v5_level7a"
  learning_rate: 5.0e-7
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  num_generations: 4
  max_prompt_length: 512
  max_completion_length: 4096
  max_steps: 10          # diagnostic: just 10 steps
  save_steps: 10
  logging_steps: 1
  warmup_ratio: 0.1
  max_grad_norm: 0.1
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  optim: "adamw_torch_fused"
  beta: 1.0
  loss_type: "dr_grpo"
  seed: 3407
