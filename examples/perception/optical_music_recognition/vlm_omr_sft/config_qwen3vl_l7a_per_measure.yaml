# Stage 2: per-measure MXC2 SFT on Level 7a.
#
# Each L7a page is expanded into per-measure rows via mxc2_slice.iter_measures.
# Sample 8 measures per page (out of ~24 × 3 parts = 72 total) to keep
# dataset size manageable. The model learns to localize and transcribe
# one measure at a time given the page image.
#
# At inference time the page is transcribed measure-by-measure and the
# slices are stitched back; the deterministic re-spell pipeline (respell.py)
# uses Stage 1's key to correct any per-measure key cascade.

model:
  name: "unsloth/Qwen3-VL-8B-Instruct"
  load_in_4bit: true
  use_gradient_checkpointing: "unsloth"
  max_length: 4096   # per-measure targets are short
  chat_template: null

lora:
  r: 32
  alpha: 32
  dropout: 0
  finetune_vision_layers: true
  finetune_language_layers: true
  finetune_attention_modules: true
  finetune_mlp_modules: true

dataset:
  repo: "zzsi/synthetic-scores"
  config: "level7a"
  split: "train"
  dev_split: "dev"
  shuffle: true
  target_format: "mxc2"
  drop_beams: true
  per_measure: true
  per_measure_sample_k: 8           # 8 random measures per page
  columns:
    image: "image"
    musicxml: "musicxml"
    id: "score_id"
    label: "level"

wandb:
  project: "openscore-omr"
  run_name: null
  log_examples_every_n_steps: 200
  n_examples: 3
  inference_max_new_tokens: 512

training:
  output_dir: "outputs"
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 2
  max_grad_norm: 0.1
  warmup_ratio: 0.03
  num_train_epochs: 2
  learning_rate: 5.0e-5
  logging_steps: 5
  save_steps: 600
  val_steps: 200
  optim: "adamw_torch_fused"
  weight_decay: 0.001
  lr_scheduler_type: "cosine"
  seed: 3407
  test_after_training: false
