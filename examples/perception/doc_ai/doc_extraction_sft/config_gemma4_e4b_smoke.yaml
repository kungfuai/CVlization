dataset:
  path: "json"
  data_files: "$DOC_EXTRACTION_SFT_TRAIN_JSONL"
  split: "train"
  target_sources:
    - "ground_truth"
  split_strategy: "document_id"
  keep_only_clean_teacher_traces: true
  ground_truth_target_format: "value_only"
  transform_ground_truth_schema: true
  pretty_json: false
  max_samples: 16

model:
  name: "google/gemma-4-E4B-it"
  auto_model_class: "image_text_to_text"
  load_in_4bit: true
  attn_implementation: "sdpa"
  tokenizer_extra_special_tokens: {}
  max_seq_length: 4096
  max_target_length: 2048

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ".*language_model\\.layers\\.\\d+\\.(self_attn\\.(q_proj|k_proj|v_proj|o_proj)|mlp\\.(gate_proj|up_proj|down_proj))$"

training:
  loss: "assistant_only"
  output_dir: "./outputs/gemma4-e4b-smoke"
  max_steps: 2
  num_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-4
  warmup_steps: 1
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"
  weight_decay: 0.01
  logging_steps: 1
  save_steps: 2
  save_total_limit: 1
  do_eval: false
  eval_split_ratio: 0.1
  eval_steps: 2
  seed: 3407
