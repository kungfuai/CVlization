dataset:
  path: "json"
  data_files: "$DOC_EXTRACTION_SFT_TRAIN_JSONL"
  split: "train"
  target_sources:
    - "ground_truth"
    - "form_identification"
  target_column: "target_json"
  split_strategy: "document_id"
  keep_only_clean_teacher_traces: false
  ground_truth_target_format: "value_only"
  transform_ground_truth_schema: true
  pretty_json: false
  max_samples: 16

model:
  name: "mistralai/Ministral-3-3B-Instruct-2512-BF16"
  auto_model_class: "image_text_to_text"
  load_in_4bit: true
  attn_implementation: "flash_attention_2"
  max_seq_length: 32768
  max_target_length: 8192

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  loss: "assistant_only"
  output_dir: "./outputs/ministral3-3b-document-extraction-sft-multitask-32k-smoke"
  max_steps: 2
  num_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  learning_rate: 1.0e-4
  warmup_steps: 1
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"
  weight_decay: 0.01
  logging_steps: 1
  save_steps: 2
  save_total_limit: 1
  do_eval: false
  eval_split_ratio: 0.1
  eval_steps: 2
  seed: 3407
