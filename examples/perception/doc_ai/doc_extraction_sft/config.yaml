# Dataset configuration
dataset:
  path: "json"
  data_files: "$DOC_EXTRACTION_SFT_TRAIN_JSONL"
  split: "train"

  # Canonical SFT labels should usually use ground_truth.
  # Add a teacher target_source when distilling model-generated labels.
  target_sources:
    - "ground_truth"
  target_column: "target_json"

  # Split by source document to avoid near-duplicate prompt/schema variants
  # leaking between train and eval.
  split_strategy: "document_id"

  # If teacher rows are enabled, this drops traces with quality warnings.
  keep_only_clean_teacher_traces: true
  ground_truth_target_format: "value_only"
  transform_ground_truth_schema: true

  # Optional: limit dataset size for quick tests.
  # max_samples: 256

  # Assistant response formatting.
  pretty_json: false

# Model configuration
model:
  # Good non-gated baseline. For stronger runs, replace with a larger
  # Qwen/Llama-family instruct model that fits the available GPU memory.
  name: "Qwen/Qwen2.5-7B-Instruct"
  load_in_4bit: true
  attn_implementation: "flash_attention_2"
  max_seq_length: 32768
  max_target_length: 8192

# LoRA configuration
lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# Training configuration
training:
  loss: "assistant_only"
  output_dir: "./outputs/qwen-document-extraction-sft"
  max_steps: 200
  num_epochs: 1

  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8

  learning_rate: 2.0e-4
  warmup_steps: 10
  lr_scheduler_type: "cosine"

  optim: "adamw_8bit"
  weight_decay: 0.01

  logging_steps: 1
  save_steps: 50
  save_total_limit: 3

  do_eval: true
  eval_split_ratio: 0.1
  eval_steps: 50

  seed: 3407
