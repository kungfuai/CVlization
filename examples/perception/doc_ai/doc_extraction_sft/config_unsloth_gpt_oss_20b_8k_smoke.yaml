dataset:
  path: "json"
  data_files: "$DOC_EXTRACTION_SFT_TRAIN_JSONL"
  split: "train"
  target_sources:
    - "ground_truth"
  split_strategy: "document_id"
  keep_only_clean_teacher_traces: true
  ground_truth_target_format: "value_only"
  transform_ground_truth_schema: true
  pretty_json: false
  max_samples: 16

model:
  name: "unsloth/gpt-oss-20b"
  load_in_4bit: true
  max_seq_length: 8192
  max_target_length: 4096

lora:
  r: 8
  alpha: 8
  dropout: 0.0
  use_gradient_checkpointing: "unsloth"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "./outputs/unsloth-gpt-oss-20b-8k-smoke"
  max_steps: 2
  num_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-4
  warmup_steps: 1
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"
  weight_decay: 0.01
  logging_steps: 1
  save_steps: 2
  save_total_limit: 1
  do_eval: false
  eval_split_ratio: 0.1
  eval_steps: 2
  seed: 3407
