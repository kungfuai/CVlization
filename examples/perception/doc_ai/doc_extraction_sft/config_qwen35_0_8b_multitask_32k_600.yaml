dataset:
  path: "json"
  data_files: "$DOC_EXTRACTION_SFT_TRAIN_JSONL"
  split: "train"
  target_sources:
    - "ground_truth"
    - "form_identification"
  target_column: "target_json"
  split_strategy: "document_id"
  keep_only_clean_teacher_traces: false
  ground_truth_target_format: "value_only"
  transform_ground_truth_schema: true
  pretty_json: false

model:
  name: "Qwen/Qwen3.5-0.8B"
  load_in_4bit: true
  attn_implementation: "flash_attention_2"
  max_seq_length: 32768
  max_target_length: 8192

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  loss: "assistant_only"
  output_dir: "./outputs/qwen35-0_8b-document-extraction-sft-multitask-32k-600"
  max_steps: 600
  num_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  learning_rate: 1.5e-4
  warmup_steps: 25
  lr_scheduler_type: "cosine"
  optim: "adamw_8bit"
  weight_decay: 0.01
  logging_steps: 1
  save_steps: 100
  save_total_limit: 4
  do_eval: false
  holdout_split: true
  eval_split_ratio: 0.1
  eval_steps: 100
  seed: 3407
