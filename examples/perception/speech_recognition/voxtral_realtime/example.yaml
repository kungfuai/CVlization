name: voxtral_realtime
capability: perception/speech_recognition
modalities:
  - audio
  - text
datasets:
  - custom
stability: experimental
resources:
  gpu: 1
  vram_gb: 16  # upstream claim; not locally verified (tested on 98GB GPU, peak 92 GiB)
  disk_gb: 50
image: cvl-voxtral-realtime
presets:
  build:
    script: build.sh
    description: Build the Docker image (PyTorch 2.11.0 + vLLM 0.25 + audio deps)
  serve:
    script: serve.sh
    description: Start the vLLM realtime server in detached mode (requires GPU with 16+ GB VRAM)
  predict:
    script: predict.sh
    description: Stream audio to the running server and receive incremental transcription
    path_args:
      - flag: "--audio"
        type: file
      - flag: "--output"
        type: file
  stop:
    script: stop.sh
    description: Stop the detached vLLM server container
  test:
    script: test.sh
    description: Full cycle smoke test (build → serve → predict → stop)
tags:
  - asr
  - speech-recognition
  - transcription
  - speech-to-text
  - streaming
  - realtime
  - websocket
  - multilingual
  - voxtral
  - mistral
  - vllm
tasks:
  - automatic_speech_recognition
  - speech_to_text
  - realtime_transcription
frameworks:
  - vllm
  - pytorch
description: >
  Multilingual realtime streaming speech transcription with Mistral Voxtral
  Mini 4B via vLLM's /v1/realtime WebSocket endpoint. Supports 13 languages
  with configurable latency (80ms–2400ms). Measured first visible text ~1.0s.

verification:
  last_verified: "2026-07-19"
  last_verification_note: >
    VRAM lifecycle measured with monitor_vram.sh (PR #248): idle 15 MiB ->
    device peak 92027 MiB (89.9 GiB) -> release 15 MiB. 509 samples at
    200ms interval. GPU: RTX PRO 6000 Blackwell Max-Q (97887 MiB total),
    UUID GPU-dd55f371-5b6e-3708-2aa5-34ef3e875ee0. Config:
    VLLM_MAX_MODEL_LEN=45000, gpu-memory-utilization=0.9 (default).
    Process peak 92004 MiB. This is vLLM KV cache reservation for the tested
    configuration, not model minimum. resources.vram_gb=16 is upstream claim,
    not locally verified. Realtime-paced streaming PASS: first event 0.529s,
    first visible text 1.057s. Fast-mode PASS: 2.23s for 5s audio.
    English and French transcripts correct. 11/13 langs untested.
  status: PARTIAL
