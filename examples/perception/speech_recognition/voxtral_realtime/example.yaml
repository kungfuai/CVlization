name: voxtral_realtime
capability: perception/speech_recognition
modalities:
  - audio
  - text
datasets:
  - custom
stability: experimental
resources:
  gpu: 1
  vram_gb: 16
  disk_gb: 50
image: cvl-voxtral-realtime
presets:
  build:
    script: build.sh
    description: Build the Docker image (PyTorch 2.11.0 + vLLM 0.25 + audio deps)
  serve:
    script: serve.sh
    description: Start the vLLM realtime server in detached mode (requires GPU with 16+ GB VRAM)
  predict:
    script: predict.sh
    description: Stream audio to the running server and receive incremental transcription
    path_args:
      - flag: "--audio"
        type: file
      - flag: "--output"
        type: file
  stop:
    script: stop.sh
    description: Stop the detached vLLM server container
  test:
    script: test.sh
    description: Full cycle smoke test (build → serve → predict → stop)
tags:
  - asr
  - speech-recognition
  - transcription
  - speech-to-text
  - streaming
  - realtime
  - websocket
  - multilingual
  - voxtral
  - mistral
  - vllm
tasks:
  - automatic_speech_recognition
  - speech_to_text
  - realtime_transcription
frameworks:
  - vllm
  - pytorch
description: >
  Multilingual realtime streaming speech transcription with Mistral Voxtral
  Mini 4B via vLLM's /v1/realtime WebSocket endpoint. Supports 13 languages
  with configurable latency (80ms–2400ms). Measured first-delta ~530–690ms.

verification:
  last_verified: "2026-07-13"
  last_verification_note: >
    Docker build OK (pytorch:2.11.0-cuda13.0 + vLLM 0.25.0; image ~40GB).
    Server startup 100s on RTX PRO 6000 Blackwell (98GB VRAM; model ~8GB,
    vLLM pre-allocates ~92GB for KV cache with max_model_len=45000).
    Realtime-paced streaming PASS: first-delta 530-692ms with concurrent
    sender/receiver, timestamped delta events. Fast-mode PASS: 2.42s for 5s
    audio. English and French transcripts correct. Containerized client via
    predict.sh PASS. test.sh uses predict.sh (no host python3 dependency).
    CVL CLI verified from /tmp/cvl_cli_test/. Cache reuse confirmed. 16GB
    VRAM minimum is upstream claim (tested on 98GB only). 11/13 langs untested.
  status: PARTIAL
