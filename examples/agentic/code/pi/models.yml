# pi (`omp`) models config for a local vLLM OpenAI-compatible endpoint.
# Mounted into the container at ~/.omp/agent/models.yml at runtime.
#
# `apiKey:` is looked up as an env var name first, falling back to a
# literal — so `apiKey: VLLM_API_KEY` resolves from the env (default
# `sk-local` set by run.sh) and works without baking secrets into git.
#
# `disableStrictTools: true` — vLLM's openai-compatible tool-call output
# isn't always strict-mode-compatible across model families; turning the
# strict check off lets pi accept tool calls as Qwen3 actually emits
# them through `--tool-call-parser qwen3_xml`.
providers:
  vllm:
    baseUrl: http://localhost:8000/v1
    apiKey: VLLM_API_KEY
    api: openai-completions
    disableStrictTools: true
    models:
      - id: Qwen/Qwen3.6-27B
        name: Qwen3.6-27B (vLLM)
        reasoning: false
        input: [text]
        contextWindow: 65536
        maxTokens: 8192
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
      - id: Qwen/Qwen3.6-35B-A3B
        name: Qwen3.6-35B-A3B (vLLM)
        reasoning: false
        input: [text]
        contextWindow: 65536
        maxTokens: 8192
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
      - id: Qwen/Qwen3.5-9B
        name: Qwen3.5-9B (vLLM)
        reasoning: false
        input: [text]
        contextWindow: 32768
        maxTokens: 8192
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
      - id: Qwen/Qwen3-4B-Instruct
        name: Qwen3-4B-Instruct (vLLM)
        reasoning: false
        input: [text]
        contextWindow: 32768
        maxTokens: 8192
        cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
