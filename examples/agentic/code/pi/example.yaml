name: agentic-pi
capability: agentic/code
modalities:
  - language
  - code
stability: experimental
resources:
  gpu: 0  # pi (omp) itself runs on CPU; the model runs in the sibling vllm preset
  vram_gb: 0
  disk_gb: 4  # upstream pi-runtime image is ~2-4 GB (Rust+Bun+Python+native)
image: pi
presets:
  build:
    script: build.sh
    description: Build the pi (omp) image. Clones can1357/oh-my-pi into ~/.cache/cvlization/oh-my-pi if missing and builds the upstream `oh-my-pi/pi:dev` base, then adds Python (pylsp) + TypeScript language servers for the LSP tool.
  run:
    script: run.sh
    description: Launch pi (omp) TUI pointed at the local vLLM server (default http://localhost:8000/v1). Pass through to the omp CLI via `--` args, e.g. `... -- -p "implement X"` for headless one-shot.
tags:
  - pi
  - omp
  - oh-my-pi
  - agentic-coding
  - tui
  - lsp
  - dap
  - qwen3
  - vllm
  - openai-compatible
tasks:
  - agentic_coding
  - code_generation
  - lsp_rename
frameworks:
  - bun
  - rust
  - typescript
description: oh-my-pi (`omp`) TUI coding agent -- a fork of mariozechner/pi-mono with LSP wired into edits, DAP debugger integration, persistent Python + Bun execution kernels, and first-class subagents -- pointed at a locally-served Qwen3.x model via vLLM's OpenAI-compatible endpoint. Sibling to the `agentic-opencode` preset but with a much wider tool surface (32 built-in tools, 13 LSP ops, 27 DAP ops).

verification:
  last_verified: "2026-05-25"
  last_verification_note: "Full agentic loop verified end-to-end on RTX PRO 6000 Blackwell (SM120, 98 GB VRAM, TP=2, BF16, CUDA graphs). Image: pi ~2.93 GB (built on oh-my-pi/pi:dev ~2.76 GB, which is python:3.12-slim + bun 1.3.14 + rust + N-API pi_natives + omp_rpc Python wheel, pinned to can1357/oh-my-pi commit 3b072a10b93a5e6ec8d024acab928b715edd6803; our layer adds python-lsp-server[all]==1.13.1 + typescript-language-server@4.4.1 for the LSP demo). Model server: sibling vllm preset, `VLLM_DETACH=1 VLLM_AGENT_DEFAULTS=1 MODEL_ID=Qwen/Qwen3.6-27B cvl run vllm serve` (same agent defaults the opencode preset uses: --enable-auto-tool-choice + --tool-call-parser qwen3_xml + --reasoning-parser qwen3 + --default-chat-template-kwargs '{\"enable_thinking\":false}' + max-model-len 65536). Two smokes both green: (1) fizzbuzz prompt -> 45 s wall, fizzbuzz.py + test_fizzbuzz.py written via the Write tool, all 4 pytest cases pass independently; (2) LSP rename in a 3-file Python project with pyproject.toml -- 31 s wall, single lsp(action='rename', apply=true) call renamed add_numbers -> sum_values across 5 sites (def + 2 imports + 2 call sites). vLLM-side config in models.yml uses disableStrictTools: true (vLLM's openai-compatible tool-call format isn't always strict-mode-compatible) and apiKey: VLLM_API_KEY (pi resolves apiKey-as-env-var-name first). Open caveats: (a) Python LSP requires a project root marker (pyproject.toml / setup.py / requirements.txt / Pipfile) -- without one pi correctly refuses LSP ops and the model burns ~6 min thinking about it before giving up; documented in README. (b) The `-p` print mode auto-allows tool calls -- no equivalent of opencode's --dangerously-skip-permissions was needed. (c) DAP (debugger) integration not yet smoked. (d) Upstream publishes no prebuilt image; build.sh clones can1357/oh-my-pi into ~/.cache/cvlization/oh-my-pi and builds the upstream pi-runtime target locally (~5-10 min first build, much faster incrementally)."
  status: VERIFIED
