name: agentic-knowact-guiclaw
capability: agentic/gui_agent
modalities:
  - vision
  - language
stability: experimental
resources:
  gpu: 0
  vram_gb: 0
  disk_gb: 1
  note: >
    GPU is used by the external VLM server (not this container).
    Qwen3.5-35B-A3B requires ~20 GB VRAM on the vLLM endpoint.
image: knowact-guiclaw
presets:
  build:
    script: build.sh
    description: Build the KnowAct-GUIClaw Docker image.
  predict:
    script: predict.sh
    description: |
      Run GUIClaw in dry-run or live mode. Requires an OpenAI-compatible
      VLM endpoint. Set GUICLAW_BASE_URL, GUICLAW_MODEL, GUICLAW_BACKEND.
      Default: dry-run with Qwen3.5-35B-A3B.
tags:
  - gui-agent
  - computer-use
  - knowact
  - guiclaw
  - memory
  - skill-library
  - self-evolving
  - cross-platform
tasks:
  - gui_automation
  - mobile_automation
  - computer_use
  - agentic_memory
frameworks:
  - nanobot-ai
  - guiclaw
description: |
  KnowAct-GUIClaw is a cross-platform GUI automation agent built on the
  Know-Route-Act-Reflect architecture. It features an experience-attributable
  memory system and a self-evolving skill library that improve performance
  across episodes. Supports Android (ADB), iOS, HarmonyOS, and desktop
  backends. Achieves 64.1% on MobileWorld with Kimi-2.6, beating GPT-5.5
  and Seed-2.0-Pro.

  Paper: https://huggingface.co/papers/2607.12625
  Code:  https://github.com/HITsz-TMG/KnowAct

verification:
  status: PARTIAL
  last_verified: "2026-07-16"
  last_verification_note: >
    Build PASS (955 MB image, pinned upstream 2d317da). Dry-run with VLM
    PASS on RTX PRO 6000 Blackwell (98 GB): Qwen3-VL-8B-Instruct via
    vLLM 0.21.0 (--enable-auto-tool-choice --tool-call-parser hermes).
    15 steps across 3 attempts, tool calls with computer_use function,
    26073 tokens consumed, 22.95s wall. Trajectory, memory (policy.md),
    host persistence all verified. ADB backend SKIPPED: no Android device.
    iOS/HarmonyOS UNTESTED.
