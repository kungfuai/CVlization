name: qed-nano
capability: agentic/formal
modalities:
  - text
stability: experimental
resources:
  gpu: 1
  vram_gb: 10
  disk_gb: 20
image: qed-nano

presets:
  build:
    script: build.sh
    description: Build the QED-Nano inference container (vLLM 0.15.1, torch 2.9.1+CUDA 12.8)
  predict:
    script: predict.sh
    description: Generate a proof for a given Olympiad math problem
  test:
    script: test.sh
    description: Smoke test with a simple induction problem
  train_sft:
    script: train_sft.sh
    description: >
      SFT fine-tune Qwen3-4B on FineProofs-SFT using LoRA.
      Single GPU capable. Pass --max-steps / --max-samples to scale.
      Builds qed-nano-sft image automatically if not present.
  train_rl:
    script: train_rl.sh
    description: >
      GRPO reinforcement learning via PipelineRL (4+ GPUs).
      Requires OPENAI_API_KEY for proof grading.
      Run with --build on first use to build the qed-nano-train image.

tags:
  - math
  - proof
  - reasoning
  - qwen3
  - olympiad
  - vllm
  - sft
  - rl
  - grpo
  - pipelinerl

tasks:
  - reasoning
  - text_generation
  - fine_tuning

frameworks:
  - pytorch
  - vllm
  - trl
  - peft
  - deepspeed

description: >
  4B-parameter Qwen3-based model trained with SFT + GRPO RL to generate
  natural-language proofs for Olympiad-level mathematical competition problems.
  Approaches Gemini 3 Pro on IMOProofBench despite being 30x smaller.
  Includes inference, SFT fine-tuning, and full RL training pipelines.
